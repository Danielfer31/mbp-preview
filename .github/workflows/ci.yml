name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Minimo privilegio: solo lectura del repositorio.
# Sin acceso de escritura a contenidos, paquetes, deployments ni secretos.
permissions:
  contents: read

jobs:
  verify:
    name: Audit, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # actions/checkout@v4.2.2 — SHA fijo para integridad
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js from .nvmrc
        # actions/setup-node@v4.4.0 — SHA fijo para integridad
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (high/critical)
        run: npm run audit

      - name: Run tests
        run: npm test

      - name: Build static site
        run: npm run build

      - name: Verify dist/ was generated
        run: test -f dist/index.html
