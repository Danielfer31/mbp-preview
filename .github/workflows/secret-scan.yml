name: Secret Scan

# Detecta secretos en el repositorio antes de que se integren.
# Mitiga T-01-18: Information Disclosure / secretos en Git (PRV-04).

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Minimo privilegio: solo lectura del repositorio.
permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect secrets with Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # actions/checkout@v4.2.2 — SHA fijo para integridad de la cadena de suministro
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        # gitleaks/gitleaks-action@v2.3.7 — SHA fijo para integridad
        # Escanea todos los commits del push/PR buscando secretos y credenciales
        uses: gitleaks/gitleaks-action@44c470d5cd02b3c5e08e98e818c1f9c56de8d6b4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: false
